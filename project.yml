name: Cineslate
options:
  bundleIdPrefix: com.sunpebble
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: 62HCT6Q83X
    MARKETING_VERSION: 0.2.1 # x-release-please-version
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"
    # Localize: extract user-facing strings into Localizable.xcstrings at build.
    SWIFT_EMIT_LOC_STRINGS: "YES"
targets:
  Cineslate:
    type: application
    platform: iOS
    sources:
      - path: Cineslate
    info:
      path: Cineslate/Info.plist
      properties:
        CFBundleDisplayName: Cineslate
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        UIUserInterfaceStyle: Dark
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # iPad multitasking (ITMS-90474) requires all four orientations on iPad.
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Keep audio playing when the screen locks / the app backgrounds.
        UIBackgroundModes:
          - audio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sunpebble.cineslate
        # Lets CineslateTests use `@testable import Cineslate`.
        ENABLE_TESTABILITY: "YES"
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  CineslateTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CineslateTests
    dependencies:
      - target: Cineslate
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.sunpebble.cineslateTests
  CineslateUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CineslateUITests
    dependencies:
      - target: Cineslate
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.sunpebble.cineslateUITests
schemes:
  Cineslate:
    build:
      targets:
        Cineslate: all
        CineslateTests: [test]
        CineslateUITests: [test]
    test:
      targets:
        - CineslateTests
        - CineslateUITests
    run:
      config: Debug
