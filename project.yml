name: Cineslate
options:
  bundleIdPrefix: com.sunpebble
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"
    # Localize: extract user-facing strings into Localizable.xcstrings at build.
    SWIFT_EMIT_LOC_STRINGS: "YES"
    # Ad-hoc sign ("-") so the app gets an application-identifier entitlement
    # (required for Keychain). Works on the Simulator without a dev team.
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
targets:
  Cineslate:
    type: application
    platform: iOS
    sources:
      - path: Cineslate
    info:
      path: Cineslate/Info.plist
      properties:
        CFBundleDisplayName: Cineslate
        UIUserInterfaceStyle: Dark
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Keep audio playing when the screen locks / the app backgrounds.
        UIBackgroundModes:
          - audio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sunpebble.cineslate
        # Lets CineslateTests use `@testable import Cineslate`.
        ENABLE_TESTABILITY: "YES"
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  CineslateTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CineslateTests
    dependencies:
      - target: Cineslate
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.sunpebble.cineslateTests
schemes:
  Cineslate:
    build:
      targets:
        Cineslate: all
        CineslateTests: [test]
    test:
      targets:
        - CineslateTests
    run:
      config: Debug
